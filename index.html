<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Discover your unofficial Wilbury name.">
  <title>What Is Your Wilbury Name?</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 20px;
      background: #74572f;
      font-family: Arial, Helvetica, sans-serif;
    }

    .poster {
      position: relative;
      width: min(100%, 768px);
      aspect-ratio: 2 / 3;
      overflow: hidden;
      background: url("poster-clean.png") center / 100% 100% no-repeat;
      box-shadow: 0 28px 80px rgba(0,0,0,.48);
    }

    .name-input,
    .find-button {
      position: absolute;
      left: 66.5%;
      top: 78.7%;
      width: 27.2%;
      height: 7.85%;
      border: 0;
      padding: 0;
      cursor: pointer;
      color: #f0dcae;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      font-size: clamp(.82rem, 3vw, 2rem);
      line-height: 1;
      letter-spacing: .015em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .name-input {
      left: 7.1%;
      top: 79.55%;
      width: 55.7%;
      height: 6.25%;
      padding: 0 3.8%;
      border: 0;
      outline: 0;
      color: #17130f;
      background: transparent;
      font-size: clamp(1rem, 3vw, 2rem);
      letter-spacing: .01em;
    }

    .name-input::placeholder {
      color: rgba(23,19,15,.56);
      opacity: 1;
    }

    .name-input:focus {
      background: rgba(255,255,255,.09);
      box-shadow: inset 0 0 0 3px rgba(139,22,22,.28);
    }

    .find-button {
      left: 66.5%;
      top: 78.7%;
      width: 27.2%;
      height: 7.85%;
      border: 0;
      padding: 0;
      cursor: pointer;
      color: #f0dcae;
      background: transparent;
      font-size: clamp(1.1rem, 4.2vw, 2.75rem);
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    .find-button:hover {
      background: rgba(255,255,255,.06);
    }

    .find-button:active {
      transform: translateY(2px);
    }

    .result {
      position: absolute;
      left: 7%;
      right: 7%;
      bottom: 3.6%;
      min-height: 8.8%;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.6% 3%;
      border-top: 3px solid #17130f;
      border-bottom: 3px solid #17130f;
      background: rgba(170,132,72,.95);
      text-align: center;
    }

    .result.visible {
      display: flex;
      animation: reveal .28s ease;
    }

    .result-name {
      margin: 0;
      color: #17130f;
      font-family: Arial Black, Arial, Helvetica, sans-serif;
      font-size: clamp(1.45rem, 5.5vw, 3.8rem);
      line-height: 1;
      text-transform: uppercase;
      text-wrap: balance;
    }

    .copy-button {
      position: absolute;
      right: 7.4%;
      bottom: 1%;
      display: none;
      border: 0;
      padding: 6px 9px;
      cursor: pointer;
      color: #f0dcae;
      background: #17130f;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(.5rem, 1.4vw, .72rem);
      font-weight: 800;
      text-transform: uppercase;
    }

    .copy-button.visible { display: block; }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      body { padding: 0; }
      .poster { width: 100%; box-shadow: none; }
    }
  </style>
</head>
<body>
  <main class="poster">
    <form id="generatorForm">
      <input
        class="name-input"
        id="personName"
        type="text"
        maxlength="80"
        autocomplete="name"
        placeholder="Your Name Here"
        aria-label="Enter your name"
        required
      >
      <button class="find-button" type="submit">Find Out</button>
    </form>

    <section class="result" id="result" aria-live="polite">
      <p class="result-name" id="resultName"></p>
    </section>

    <button class="copy-button" id="copyButton" type="button">Copy Name</button>
  </main>

  <script>

      thomas: "Charlie T. Wilbury Jr.",

      "Lester","Mack","Marlow","Merle","Milo","Orville","Otto","Percy",
      "Roscoe","Rufus","Silas","Virgil","Wally","Wendell","Wiley","Zeke"

    const femaleAliases = [

    const maleNames = new Set([
      "aaron","adam","adrian","alan","albert","alexander","alfred","andrew",

      "zachary","alexandros","andreas","christos","dimitri","dimitrios",
      "georgios","giannis","konstantinos","kostas","nikos","panayiotis",
      "spiros","stavros","theo","vasilis","yiannis"
    ]);

    const maleMiddles = ["","",""," B."," C."," J."," Ray"," Lee"," Earl"," Dean"," Joe"," Lou"];
    const femaleMiddles = ["","",""," B."," C."," J."," Mae"," June"," Pearl"," Lou"," Belle"," Rose"];
    const suffixes = ["Wilbury","Wilbury","Wilbury","Wilbury","Wilbury Jr.","Wilbury III"];

    function hashString(value) {
      let hash = 2166136261;
      for (let i = 0; i < value.length; i++) {
        hash ^= value.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function firstName(value) {
      return value.trim().split(/\s+/)[0].toLowerCase().replace(/[^a-z'-]/g, "");
    }

    function generateName(fullName) {
      const first = firstName(fullName);
      if (officialAliases[first]) return officialAliases[first];

      const seed = hashString(fullName.trim().toLowerCase());
      let aliases;
      let middles;

      if (femaleNames.has(first)) {
        aliases = femaleAliases;
        middles = femaleMiddles;
      } else if (maleNames.has(first)) {
        aliases = maleAliases;
        middles = maleMiddles;
      } else {
        aliases = [...maleAliases, ...femaleAliases];
        middles = [...maleMiddles, ...femaleMiddles];
      }

      const alias = aliases[seed % aliases.length];
      const middle = middles[(seed >>> 5) % middles.length];
      const suffix = suffixes[(seed >>> 11) % suffixes.length];

      return `${alias}${middle} ${suffix}`;
    }

    const form = document.getElementById("generatorForm");
    const input = document.getElementById("personName");
    const result = document.getElementById("result");
    const resultName = document.getElementById("resultName");
    const copyButton = document.getElementById("copyButton");

    form.addEventListener("submit", event => {
      event.preventDefault();
      const value = input.value.trim();
      if (!value) return input.focus();

      resultName.textContent = generateName(value);
      result.classList.remove("visible");
      copyButton.classList.remove("visible");
      void result.offsetWidth;
      result.classList.add("visible");
      copyButton.classList.add("visible");
    });

    copyButton.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(resultName.textContent);
        copyButton.textContent = "Copied";
      } catch {
        copyButton.textContent = "Copy failed";
      }
      setTimeout(() => copyButton.textContent = "Copy Name", 1400);
    });
  </script>
</body>
</html>
