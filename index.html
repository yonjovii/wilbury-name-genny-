<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>What Is Your Wilbury Name?</title>
<meta name="description" content="Discover your unofficial Wilbury name and baggage tag.">
<style>
:root{
  --ink:#251a12;
  --red:#a92b24;
  --cream:#ead8b0;
  --paper:#ead9b7;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{
  display:grid;
  place-items:center;
  padding:20px;
  background:#5a3a24;
  font-family:"Courier New",Courier,monospace;
}
.poster{
  position:relative;
  width:min(100%,768px);
  aspect-ratio:2/3;
  background:url("artwork.png") center/100% 100% no-repeat;
  box-shadow:0 28px 80px rgba(0,0,0,.48);
  overflow:hidden;
}
.live-input{
  position:absolute;
  left:8.1%;
  top:30.05%;
  width:44.8%;
  height:5.2%;
  border:0;
  outline:0;
  padding:0 2.8%;
  color:var(--ink);
  background:rgba(236,217,181,.97);
  font-family:"Courier New",Courier,monospace;
  font-size:clamp(.9rem,2.6vw,1.65rem);
}
.live-input::placeholder{color:rgba(37,26,18,.55)}
.live-input:focus{box-shadow:inset 0 0 0 3px rgba(169,43,36,.22)}
.find-button{
  position:absolute;
  left:13.5%;
  top:37.2%;
  width:35.4%;
  height:5.55%;
  border:0;
  cursor:pointer;
  color:#f2dec0;
  background:rgba(169,43,36,.97);
  font-family:"Courier New",Courier,monospace;
  font-size:clamp(1rem,3.1vw,1.9rem);
  font-weight:900;
  letter-spacing:.035em;
  text-transform:uppercase;
  box-shadow:3px 4px 0 rgba(37,26,18,.18);
}
.find-button:active{transform:translateY(2px)}
.result-panel{
  position:absolute;
  left:31.1%;
  top:55.2%;
  width:54.7%;
  height:19.7%;
  padding:2.1% 2.2%;
  background:
    radial-gradient(circle at 86% 80%,transparent 0 20px,rgba(129,87,49,.15) 21px 27px,transparent 28px),
    linear-gradient(rgba(241,229,204,.98),rgba(227,207,169,.98));
  border:1px solid rgba(37,26,18,.35);
  transform:rotate(-3deg);
  display:grid;
  grid-template-columns:1.15fr .85fr;
  gap:1.8% 3.2%;
  opacity:0;
  pointer-events:none;
}
.result-panel.visible{
  opacity:1;
  animation:tagReveal .55s cubic-bezier(.18,.86,.26,1.05);
}
.field{
  border-bottom:1px dotted rgba(37,26,18,.5);
  padding-bottom:2px;
  min-width:0;
}
.field.full{grid-column:1/-1}
.field small{
  display:block;
  color:var(--red);
  font-size:clamp(.42rem,1.25vw,.72rem);
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
}
.field strong{
  display:block;
  margin-top:2px;
  color:var(--ink);
  font-size:clamp(.68rem,2vw,1.18rem);
  line-height:1.05;
  text-transform:uppercase;
  overflow-wrap:anywhere;
}
.field.full strong{
  font-size:clamp(.95rem,2.7vw,1.6rem);
}
.try-button,.copy-button{
  position:absolute;
  top:81.5%;
  height:3.8%;
  border:0;
  cursor:pointer;
  color:var(--ink);
  background:rgba(235,218,184,.97);
  font-family:"Courier New",Courier,monospace;
  font-size:clamp(.55rem,1.65vw,.95rem);
  font-weight:900;
  text-transform:uppercase;
}
.try-button{left:20.6%;width:27.4%}
.copy-button{left:51.7%;width:27.6%}
.try-button:active,.copy-button:active{transform:translateY(2px)}
.hidden{display:none}
@keyframes tagReveal{
  0%{opacity:0;transform:translateY(-24px) rotate(1deg) scale(.96)}
  72%{opacity:1;transform:translateY(3px) rotate(-3.5deg) scale(1.01)}
  100%{transform:translateY(0) rotate(-3deg) scale(1)}
}
@media(max-width:520px){
  body{padding:0}
  .poster{width:100%;box-shadow:none}
}
</style>
</head>
<body>
<main class="poster">
  <form id="generatorForm">
    <input class="live-input" id="personName" type="text" maxlength="80" autocomplete="name" placeholder="Type your name here..." required>
    <button class="find-button" type="submit">Find Out</button>
  </form>

  <section class="result-panel" id="resultPanel" aria-live="polite">
    <div class="field full"><small>Name</small><strong id="alias"></strong></div>
    <div class="field"><small>Destination</small><strong id="destination"></strong></div>
    <div class="field"><small>Baggage No.</small><strong id="number"></strong></div>
    <div class="field"><small>Via</small><strong id="via"></strong></div>
    <div class="field"><small>Route</small><strong id="route"></strong></div>
    <div class="field"><small>Checked By</small><strong id="checked"></strong></div>
  </section>

  <button class="try-button" id="againButton" type="button">Try Another</button>
  <button class="copy-button" id="copyButton" type="button">Copy Details</button>
</main>

<script>
const official={
  jeff:"Otis Wilbury","jeff lynne":"Otis Wilbury",
  bob:"Lucky Wilbury",robert:"Lucky Wilbury","bob dylan":"Lucky Wilbury",
  george:"Nelson Wilbury","george harrison":"Nelson Wilbury",
  tom:"Charlie T. Wilbury Jr.",thomas:"Charlie T. Wilbury Jr.","tom petty":"Charlie T. Wilbury Jr.",
  roy:"Lefty Wilbury","roy orbison":"Lefty Wilbury"
};

const male=[
  "Amos","Arlo","Buster","Clyde","Clem","Cornelius","Dewey","Elmer","Elwood","Floyd",
  "Gus","Hank","Harlan","Homer","Jasper","Jeb","Lester","Mack","Marlow","Merle","Milo",
  "Orville","Otto","Percy","Roscoe","Rufus","Silas","Virgil","Wally","Wendell","Wiley","Zeke"
];

const female=[
  "Birdie","Mabel","Dottie","Hattie","Pearl","Bonnie","Lula","Elsie","Josie","Daisy",
  "Winnie","Sadie","Ruby","Cleo","Etta","Flora","June","Cora","Fern","Opal","Goldie",
  "Alma","Delia","Lottie","Faye","Boots","Cricket","Honey","Dusty","Bessie","Dolly",
  "Millie","Nellie","Tilly","Rosie","Lucille","Mae","Minnie","Jolene","Patsy","Betty","Maggie"
];

const femaleNames=new Set(("abby abigail ada adelaide adele adriana agnes aimee alana alexandra alice alicia alison alyssa amanda amber amelia amy ana andrea angela angelina anita ann anna anne annie april ariana ashley audrey ava barbara beatrice bella belinda beth bethany betty bianca bridget brittany brooke caitlin camilla carla carmen carol caroline carolyn cassandra cassie catherine cathy charlotte chelsea cheryl chloe christina christine claire clara claudia courtney daisy danielle daphne deborah diana diane donna dorothy eden edith eileen elaine eleanor elena elise elizabeth ella ellen ellie eloise elsie emily emma erin esther eva evelyn faith faye fiona florence frances gabriella georgia gina gloria grace hannah harriet hazel heather heidi helen holly imogen irene isabel isabella ivy jacqueline jade jane janet jasmine jean jenna jennifer jessica jill joan joanna jodie josephine joy judith julia julie juliet karen kate katherine kathleen katie kayla kelly kelsey kim kirsten kylie laura lauren leah leila lena lillian lily linda lisa liv lorraine louise lucy lydia mabel madeline madison maggie maisie mandy margaret maria marie marilyn marina marisa mary matilda maureen maya megan melanie melissa mia michelle mila molly monica nadia naomi natalie natasha nicole nina nora olivia paige pamela patricia paula penelope phoebe rachel rebecca renee rita rose rosemary rosie ruby sally samantha sandra sarah savannah scarlett shannon sharon sheila shelley sophie sophia stacey stephanie susan suzanne sylvia tamara tanya tara teresa theresa tiffany tracy valerie vanessa veronica victoria violet wendy whitney yvette zoe eleni katerina sofia stella vasiliki despina").split(" "));

const destinations=[
  "End of the Line","Handle With Care","Heading for the Light","New Blue Moon","Dirty World",
  "Rattled","Last Night","Congratulations","She's My Baby","Wilbury Twist","Margarita",
  "Not Alone Any More","Tweeter & the Monkey Man","Xanadu","Eldorado","Shangri-La","Cloud Nine",
  "The Great Wide Open","Mystery Girl","Highway 61","Any Road","Learning to Fly","Blue Bayou"
];

const viaStops=["Shangri-La","Xanadu","Eldorado","New Blue Moon","Cloud Nine","End of the Line","Heading for the Light","The Great Wide Open"];
const checkedBy=["Otis","Nelson","Lucky","Lefty","Charlie T."];
const maleMiddles=["","",""," B."," C."," J."," Ray"," Lee"," Earl"," Dean"," Joe"," Lou"];
const femaleMiddles=["","",""," B."," C."," J."," Mae"," June"," Pearl"," Lou"," Belle"," Rose"];
const suffixes=["Wilbury","Wilbury","Wilbury","Wilbury","Wilbury Jr.","Wilbury III"];

function hashString(value){
  let hash=2166136261;
  for(let i=0;i<value.length;i++){
    hash^=value.charCodeAt(i);
    hash=Math.imul(hash,16777619);
  }
  return hash>>>0;
}

function clean(value){return value.trim().replace(/\s+/g," ")}
function firstName(value){return clean(value).split(" ")[0].toLowerCase().replace(/[^a-z'-]/g,"")}

function generateAlias(fullName){
  const cleaned=clean(fullName);
  const key=cleaned.toLowerCase();
  const first=firstName(cleaned);

  if(official[key]) return official[key];
  if(official[first]) return official[first];

  const seed=hashString(key);
  const isFemale=femaleNames.has(first);
  const aliases=isFemale?female:male;
  const middles=isFemale?femaleMiddles:maleMiddles;

  return `${aliases[seed%aliases.length]}${middles[(seed>>>5)%middles.length]} ${suffixes[(seed>>>11)%suffixes.length]}`;
}

function generateTravel(fullName){
  const seed=hashString(clean(fullName).toLowerCase());
  return {
    destination:destinations[(seed>>>2)%destinations.length],
    via:viaStops[(seed>>>7)%viaStops.length],
    checked:checkedBy[(seed>>>13)%checkedBy.length],
    route:`TW-${88+(seed%3)}`,
    number:`WB-${String(seed%1000000).padStart(6,"0")}`
  };
}

const form=document.getElementById("generatorForm");
const input=document.getElementById("personName");
const panel=document.getElementById("resultPanel");
const againButton=document.getElementById("againButton");
const copyButton=document.getElementById("copyButton");
let current=null;

function showResult(name){
  const travel=generateTravel(name);
  current={alias:generateAlias(name),...travel};

  document.getElementById("alias").textContent=current.alias;
  document.getElementById("destination").textContent=current.destination;
  document.getElementById("number").textContent=current.number;
  document.getElementById("via").textContent=current.via;
  document.getElementById("route").textContent=current.route;
  document.getElementById("checked").textContent=current.checked;

  panel.classList.remove("visible");
  void panel.offsetWidth;
  panel.classList.add("visible");
}

form.addEventListener("submit",event=>{
  event.preventDefault();
  const value=clean(input.value);
  if(!value) return input.focus();
  showResult(value);
});

againButton.addEventListener("click",()=>{
  panel.classList.remove("visible");
  input.value="";
  input.focus();
});

copyButton.addEventListener("click",async()=>{
  if(!current) return;

  const text=`${current.alias}
Destination: ${current.destination}
Via: ${current.via}
Route: ${current.route}
Baggage No.: ${current.number}
Checked by: ${current.checked}`;

  try{
    await navigator.clipboard.writeText(text);
    copyButton.textContent="Copied";
    setTimeout(()=>copyButton.textContent="Copy Details",1400);
  }catch{}
});
</script>
</body>
</html>
