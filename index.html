<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Discover your unofficial Wilbury name.">
  <meta property="og:title" content="What Is Your Wilbury Name?">
  <meta property="og:description" content="Someday everybody gonna be a Wilbury.">
  <title>What Is Your Wilbury Name?</title>
  <style>
    :root {
      --paper: #aa8349;
      --paper-light: #c19a5c;
      --ink: #15110d;
      --red: #b6191c;
      --cream: #ead6a7;
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 22px;
      color: var(--ink);
      background: #765a34;
      font-family: Arial, Helvetica, sans-serif;
    }

    .site {
      width: min(100%, 768px);
      overflow: hidden;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.025) 0 1px,
          rgba(0,0,0,.025) 1px 3px
        ),
        linear-gradient(var(--paper-light), var(--paper));
      box-shadow: 0 28px 80px rgba(0,0,0,.45);
    }

    .header-art {
      display: block;
      width: 100%;
      height: auto;
    }

    .quote {
      margin: 18px 24px 16px;
      text-align: center;
      font-size: clamp(.9rem, 2.4vw, 1.28rem);
      font-weight: 900;
      font-style: italic;
      letter-spacing: .025em;
      text-transform: uppercase;
    }

    .quote::after {
      content: "";
      display: block;
      width: 34%;
      height: 3px;
      margin: 10px auto 0;
      background: var(--red);
    }

    .generator {
      padding: 0 6.2% 16px;
    }

    .field-label {
      display: block;
      margin: 0 0 9px;
      font-size: clamp(.72rem, 2vw, 1rem);
      font-weight: 900;
      font-style: italic;
      letter-spacing: .07em;
      text-transform: uppercase;
    }

    .field-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 30%;
      gap: 14px;
    }

    .name-panel,
    .action-button {
      min-height: clamp(64px, 9vw, 94px);
      border: 4px solid var(--ink);
    }

    .name-panel {
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 clamp(16px, 4vw, 34px);
      background:
        linear-gradient(rgba(232,211,163,.92), rgba(232,211,163,.92)),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.03) 0 1px,
          rgba(0,0,0,.025) 1px 3px
        );
    }

    .name-input,
    .result-name {
      width: 100%;
      margin: 0;
      border: 0;
      outline: 0;
      color: var(--ink);
      background: transparent;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.05rem, 3.2vw, 2rem);
      line-height: 1.1;
    }

    .name-input::placeholder {
      color: rgba(21,17,13,.55);
      opacity: 1;
    }

    .result-name {
      display: none;
      font-family: Arial Black, Arial, Helvetica, sans-serif;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
      text-wrap: balance;
    }

    .name-panel.result-mode .name-input { display: none; }

    .name-panel.result-mode .result-name {
      display: block;
      animation: stamp .42s cubic-bezier(.2,.8,.2,1);
    }

    .action-button {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      cursor: pointer;
      color: var(--cream);
      background:
        linear-gradient(rgba(182,25,28,.96), rgba(182,25,28,.96)),
        repeating-linear-gradient(
          0deg,
          transparent 0 6px,
          rgba(0,0,0,.04) 6px 7px
        );
      font-family: Arial Black, Arial, Helvetica, sans-serif;
      font-size: clamp(.9rem, 3.1vw, 2rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: .015em;
      text-transform: uppercase;
      white-space: nowrap;
      box-shadow: 5px 5px 0 rgba(21,17,13,.2);
    }

    .action-button:hover,
    .utility-button:hover { filter: brightness(1.04); }

    .action-button:active,
    .utility-button:active {
      transform: translate(2px, 2px);
    }

    .utilities {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 12px;
    }

    .utility-button {
      border: 2px solid var(--ink);
      padding: 9px 12px;
      cursor: pointer;
      color: var(--cream);
      background: var(--ink);
      font: inherit;
      font-size: .72rem;
      font-weight: 900;
      letter-spacing: .055em;
      text-transform: uppercase;
    }

    .utility-button.secondary {
      color: var(--ink);
      background: rgba(234,214,167,.7);
    }

    .result-tools {
      display: none;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 12px;
    }

    .result-tools.visible { display: flex; }

    .status-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-top: 12px;
      font-size: .68rem;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
      opacity: .82;
    }

    .photo-wrap {
      padding: 4px 3.4% 34px;
    }

    .photo {
      display: block;
      width: 100%;
      height: auto;
      transform: rotate(-.35deg);
      filter: contrast(1.04);
      box-shadow: 8px 9px 0 rgba(21,17,13,.18);
      transition: transform .35s ease;
    }

    .photo-wrap.inducted .photo {
      transform: rotate(-.35deg) translateY(5px);
    }

    .membership-card {
      display: none;
      margin: 18px 6.2% 0;
      padding: 20px;
      border: 4px solid var(--ink);
      background:
        linear-gradient(rgba(234,214,167,.92), rgba(234,214,167,.92)),
        repeating-linear-gradient(
          -8deg,
          transparent 0 6px,
          rgba(0,0,0,.025) 6px 7px
        );
      text-align: center;
      box-shadow: 6px 7px 0 rgba(21,17,13,.18);
      transform: rotate(-.4deg);
    }

    .membership-card.visible {
      display: block;
      animation: reveal .35s ease;
    }

    .membership-card small {
      display: block;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .membership-card h2 {
      margin: 10px 0 6px;
      color: var(--red);
      font-family: Arial Black, Arial, sans-serif;
      font-size: clamp(1.8rem, 5vw, 3.4rem);
      line-height: 1;
      text-transform: uppercase;
    }

    .membership-card p {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
    }

    footer {
      padding: 0 28px 28px;
      text-align: center;
      font-size: .66rem;
      line-height: 1.5;
      opacity: .68;
    }

    @keyframes stamp {
      0% { opacity: 0; transform: scale(1.35) rotate(-2deg); filter: blur(2px); }
      55% { opacity: 1; transform: scale(.96) rotate(.5deg); filter: blur(0); }
      100% { transform: scale(1) rotate(0); }
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 560px) {
      body { padding: 0; }
      .site { width: 100%; box-shadow: none; }
      .field-row { grid-template-columns: 1fr; }
      .action-button { min-height: 58px; }
      .status-row { flex-direction: column; gap: 4px; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <main class="site">
    <img class="header-art" src="header-art.png" alt="Travelling Wilburys — What Is Your Wilbury Name?">

    <p class="quote">“Someday everybody gonna be a Wilbury.”</p>

    <form class="generator" id="generatorForm">
      <label class="field-label" id="fieldLabel" for="personName">Enter your name</label>

      <div class="field-row">
        <div class="name-panel" id="namePanel">
          <input
            class="name-input"
            id="personName"
            type="text"
            maxlength="80"
            autocomplete="name"
            placeholder="Your Name Here"
            required
          >
          <p class="result-name" id="resultName" aria-live="polite"></p>
        </div>

        <button class="action-button" id="actionButton" type="submit">Find Out</button>
      </div>

      <div class="utilities">
        <button class="utility-button secondary" id="randomButton" type="button">Random Name</button>
        <button class="utility-button secondary" id="soundButton" type="button">Sound: On</button>
      </div>

      <div class="result-tools" id="resultTools">
        <button class="utility-button" id="copyButton" type="button">Copy My Name</button>
        <button class="utility-button" id="shareButton" type="button">Copy Share Link</button>
        <button class="utility-button" id="cardButton" type="button">Make Membership Card</button>
      </div>

      <div class="status-row">
        <span id="counterText">0 Wilburys inducted on this device</span>
        <span id="statusText"></span>
      </div>
    </form>

    <section class="membership-card" id="membershipCard" aria-live="polite">
      <small>Official Family Registry</small>
      <h2 id="cardName"></h2>
      <p>Someday everybody gonna be a Wilbury.</p>
    </section>

    <div class="photo-wrap" id="photoWrap">
      <img class="photo" src="wilburys-photo.png" alt="Vintage-style photograph of the Traveling Wilburys">
    </div>

    <canvas id="cardCanvas" width="1200" height="700" hidden></canvas>

    <footer>
      Fan-made novelty project. Not affiliated with the Traveling Wilburys,
      their estates, labels, roadies, cousins or mysterious half-brothers.
    </footer>
  </main>

    ];

    const femaleNames = new Set([
      "abby","abigail","ada","adelaide","adele","adriana","agnes","aimee",

      "janet","jasmine","jean","jenna","jennifer","jessica","jill","joan",
      "joanna","jodie","josephine","joy","judith","julia","julie","juliet",
      "karen","kate","katherine","kathleen","katie","kayla","kelly","kelsey",
      "kim","kirsten","kylie","laura","lauren","leah","leila","lena","lillian",
      "lily","linda","lisa","liv","lorraine","louise","lucy","lydia","mabel",
      "madeline","madison","maggie","maisie","mandy","margaret","maria","marie",
      "marilyn","marina","marisa","mary","matilda","maureen","maya","megan",
      "melanie","melissa","mia","michelle","mila","molly","monica","nadia",
      "naomi","natalie","natasha","nicole","nina","nora","olivia","paige",
      "pamela","patricia","paula","penelope","phoebe","rachel","rebecca",
      "renee","rita","rose","rosemary","rosie","ruby","sally","samantha",
      "sandra","sarah","savannah","scarlett","shannon","sharon","sheila",
      "shelley","sophie","sophia","stacey","stephanie","susan","suzanne",

      "valerie","vanessa","veronica","victoria","violet","wendy","whitney",
      "yvette","zoe","eleni","katerina","sofia","stella","vasiliki","despina"
    ]);

    const maleNames = new Set([
      "aaron","adam","adrian","alan","albert","alexander","alfred","andrew",
      "anthony","arthur","ben","benjamin","bernard","bill","billy","brad",
      "bradley","brandon","brian","bruce","cameron","carl","charles","chris",
      "christopher","clark","colin","connor","craig","dan","daniel","darren",
      "david","dean","dennis","derek","donald","douglas","dylan","edward",
      "eric","ethan","eugene","frank","fred","gary","gavin","geoff","gerald",
      "gordon","graham","grant","greg","harold","harry","henry","howard","hugh",
      "ian","isaac","jack","jacob","james","jason","jeremy","jerry","jim",
      "jimmy","joel","john","jon","jonathan","joseph","josh","joshua","julian",
      "justin","keith","kenneth","kevin","kyle","lawrence","leonard","liam",
      "louis","luke","marcus","mark","martin","matt","matthew","max","michael",
      "mike","mitchell","nathan","neil","nicholas","nick","noah","oliver",
      "oscar","owen","patrick","paul","peter","philip","raymond","richard",
      "rick","roger","ronald","ross","russell","ryan","samuel","scott","sean",
      "simon","stephen","steven","stuart","terry","theodore","tim","timothy",
      "toby","todd","tony","trevor","victor","vincent","wayne","william",
      "zachary","alexandros","andreas","christos","dimitri","dimitrios",
      "georgios","giannis","konstantinos","kostas","nikos","panayiotis",
      "spiros","stavros","theo","vasilis","yiannis"
    ]);

    const randomCivilianNames = [
      "Martha Bell","Johnny Dean","Sadie Rose","Arthur Cole","Clara June",
      "Walter Pike","Mabel Quinn","Rosie Lane","Harold Finch","Daisy Moore",
      "Frank Bennett","Etta Jameson","Nora Wells","George Cooper","Lucy Gray"
    ];

    const maleMiddles = ["","",""," B."," C."," J."," Ray"," Lee"," Earl"," Dean"," Joe"," Lou"];
    const femaleMiddles = ["","",""," B."," C."," J."," Mae"," June"," Pearl"," Lou"," Belle"," Rose"];
    const suffixes = ["Wilbury","Wilbury","Wilbury","Wilbury","Wilbury Jr.","Wilbury III"];

    function hashString(value) {
      let hash = 2166136261;
      for (let i = 0; i < value.length; i++) {
        hash ^= value.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function clean(value) {
      return value.trim().replace(/\s+/g, " ");
    }

    function firstName(value) {
      return clean(value).split(" ")[0].toLowerCase().replace(/[^a-z'-]/g, "");
    }

    function generateName(fullName) {
      const cleaned = clean(fullName);
      const fullKey = cleaned.toLowerCase();
      const first = firstName(cleaned);

      if (officialAliases[fullKey]) return officialAliases[fullKey];
      if (officialAliases[first]) return officialAliases[first];

      const seed = hashString(fullKey);
      let aliases;
      let middles;

      if (femaleNames.has(first)) {
        aliases = femaleAliases;
        middles = femaleMiddles;
      } else if (maleNames.has(first)) {
        aliases = maleAliases;
        middles = maleMiddles;
      } else {
        aliases = [...maleAliases, ...femaleAliases];
        middles = [...maleMiddles, ...femaleMiddles];
      }

      return `${aliases[seed % aliases.length]}${middles[(seed >>> 5) % middles.length]} ${suffixes[(seed >>> 11) % suffixes.length]}`;
    }

    const form = document.getElementById("generatorForm");
    const input = document.getElementById("personName");
    const panel = document.getElementById("namePanel");
    const resultName = document.getElementById("resultName");
    const label = document.getElementById("fieldLabel");
    const actionButton = document.getElementById("actionButton");
    const randomButton = document.getElementById("randomButton");
    const soundButton = document.getElementById("soundButton");
    const resultTools = document.getElementById("resultTools");
    const copyButton = document.getElementById("copyButton");
    const shareButton = document.getElementById("shareButton");
    const cardButton = document.getElementById("cardButton");
    const counterText = document.getElementById("counterText");
    const statusText = document.getElementById("statusText");
    const membershipCard = document.getElementById("membershipCard");
    const cardName = document.getElementById("cardName");
    const photoWrap = document.getElementById("photoWrap");
    const canvas = document.getElementById("cardCanvas");

    let showingResult = false;
    let currentCivilianName = "";
    let currentAlias = "";
    let soundEnabled = localStorage.getItem("wilburySound") !== "off";
    let count = Number(localStorage.getItem("wilburyCount") || 0);

    function updateCounter() {
      counterText.textContent = `${count} Wilbur${count === 1 ? "y" : "ys"} inducted on this device`;
    }

    function setStatus(message) {
      statusText.textContent = message;
      clearTimeout(setStatus.timer);
      setStatus.timer = setTimeout(() => statusText.textContent = "", 1800);
    }

    function playChord() {
      if (!soundEnabled) return;

      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;

      const ctx = new AudioContext();
      const now = ctx.currentTime;
      const frequencies = [196, 246.94, 293.66, 392];

      frequencies.forEach((frequency, index) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.value = frequency;

        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(.045, now + index * .035 + .02);
        gain.gain.exponentialRampToValueAtTime(.001, now + .75 + index * .04);

        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now + index * .035);
        osc.stop(now + .85 + index * .04);
      });

      setTimeout(() => ctx.close(), 1100);
    }

    function showResult(civilianName, pushUrl = true) {
      currentCivilianName = clean(civilianName);
      currentAlias = generateName(currentCivilianName);

      resultName.textContent = currentAlias;
      panel.classList.add("result-mode");
      label.textContent = "Your Wilbury name";
      actionButton.textContent = "Again";
      resultTools.classList.add("visible");
      membershipCard.classList.remove("visible");
      photoWrap.classList.add("inducted");
      showingResult = true;

      count += 1;
      localStorage.setItem("wilburyCount", String(count));
      updateCounter();
      playChord();

      if (pushUrl) {
        const url = new URL(window.location.href);
        url.searchParams.set("name", currentCivilianName);
        history.replaceState({}, "", url);
      }
    }

    function resetGenerator() {
      showingResult = false;
      panel.classList.remove("result-mode");
      label.textContent = "Enter your name";
      actionButton.textContent = "Find Out";
      resultTools.classList.remove("visible");
      membershipCard.classList.remove("visible");
      photoWrap.classList.remove("inducted");
      input.value = "";
      input.focus();

      const url = new URL(window.location.href);
      url.searchParams.delete("name");
      history.replaceState({}, "", url);
    }

    form.addEventListener("submit", event => {
      event.preventDefault();

      if (showingResult) {
        resetGenerator();
        return;
      }

      const value = clean(input.value);
      if (!value) return input.focus();

      showResult(value);
    });

    randomButton.addEventListener("click", () => {
      const randomName = randomCivilianNames[Math.floor(Math.random() * randomCivilianNames.length)];
      input.value = randomName;
      if (showingResult) resetGenerator();
      input.value = randomName;
      showResult(randomName);
    });

    soundButton.addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      localStorage.setItem("wilburySound", soundEnabled ? "on" : "off");
      soundButton.textContent = `Sound: ${soundEnabled ? "On" : "Off"}`;
      if (soundEnabled) playChord();
    });

    copyButton.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(currentAlias);
        setStatus("Name copied");
      } catch {
        setStatus("Copy failed");
      }
    });

    shareButton.addEventListener("click", async () => {
      const url = new URL(window.location.href);
      url.searchParams.set("name", currentCivilianName);
      const message = `I'm ${currentAlias}. Find your Wilbury name: ${url}`;

      try {
        await navigator.clipboard.writeText(message);
        setStatus("Share link copied");
      } catch {
        setStatus("Copy failed");
      }
    });

    cardButton.addEventListener("click", () => {
      cardName.textContent = currentAlias;
      membershipCard.classList.add("visible");

      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#b58b4d";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < 1800; i++) {
        const shade = 110 + Math.floor(Math.random() * 55);
        ctx.fillStyle = `rgba(${shade},${shade - 25},${shade - 55},.08)`;
        ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 2, 2);
      }

      ctx.strokeStyle = "#15110d";
      ctx.lineWidth = 12;
      ctx.strokeRect(40, 40, 1120, 620);

      ctx.fillStyle = "#b6191c";
      ctx.fillRect(70, 75, 1060, 150);

      ctx.fillStyle = "#ead6a7";
      ctx.font = "900 58px Arial";
      ctx.textAlign = "center";
      ctx.fillText("OFFICIAL WILBURY FAMILY REGISTRY", 600, 170);

      ctx.fillStyle = "#15110d";
      ctx.font = "900 44px Arial";
      ctx.fillText("THIS CERTIFIES THAT", 600, 300);

      let size = 88;
      do {
        ctx.font = `900 ${size}px Arial`;
        size -= 2;
      } while (ctx.measureText(currentAlias.toUpperCase()).width > 1040 && size > 42);

      ctx.fillStyle = "#b6191c";
      ctx.fillText(currentAlias.toUpperCase(), 600, 430);

      ctx.fillStyle = "#15110d";
      ctx.font = "italic 38px Georgia";
      ctx.fillText("Someday everybody gonna be a Wilbury.", 600, 525);

      ctx.font = "800 25px Arial";
      ctx.fillText("UNOFFICIAL • FAN-MADE • HANDLE WITH CARE", 600, 610);

      const link = document.createElement("a");
      link.download = `${currentAlias.replace(/[^a-z0-9]+/gi, "-").toLowerCase()}-membership-card.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();

      setStatus("Membership card saved");
    });

    soundButton.textContent = `Sound: ${soundEnabled ? "On" : "Off"}`;
    updateCounter();

    const sharedName = new URL(window.location.href).searchParams.get("name");
    if (sharedName) {
      input.value = sharedName;
      showResult(sharedName, false);
    }
  </script>
</body>
</html>
