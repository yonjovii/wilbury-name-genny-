<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Discover your unofficial Wilbury name.">
  <title>What Is Your Wilbury Name?</title>
  <style>
    :root {
      --paper: #aa8349;
      --paper-light: #c19a5c;
      --ink: #15110d;
      --red: #b6191c;
      --cream: #ead6a7;
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 22px;
      color: var(--ink);
      background: #765a34;
      font-family: Arial, Helvetica, sans-serif;
    }

    .site {
      width: min(100%, 768px);
      overflow: hidden;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.025) 0 1px,
          rgba(0,0,0,.025) 1px 3px
        ),
        linear-gradient(var(--paper-light), var(--paper));
      box-shadow: 0 28px 80px rgba(0,0,0,.45);
    }

    .header-art {
      display: block;
      width: 100%;
      height: auto;
    }

    .quote {
      margin: 18px 24px 16px;
      text-align: center;
      font-size: clamp(.9rem, 2.4vw, 1.28rem);
      font-weight: 900;
      font-style: italic;
      letter-spacing: .025em;
      text-transform: uppercase;
    }

    .quote::after {
      content: "";
      display: block;
      width: 34%;
      height: 3px;
      margin: 10px auto 0;
      background: var(--red);
    }

    .generator {
      padding: 0 6.2% 22px;
    }

    .field-label {
      display: block;
      margin: 0 0 9px;
      font-size: clamp(.72rem, 2vw, 1rem);
      font-weight: 900;
      font-style: italic;
      letter-spacing: .07em;
      text-transform: uppercase;
    }

    .field-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 30%;
      gap: 14px;
    }

    .name-panel,
    .action-button {
      min-height: clamp(64px, 9vw, 94px);
      border: 4px solid var(--ink);
    }

    .name-panel {
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 clamp(16px, 4vw, 34px);
      background:
        linear-gradient(rgba(232,211,163,.92), rgba(232,211,163,.92)),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.03) 0 1px,
          rgba(0,0,0,.025) 1px 3px
        );
    }

    .name-input,
    .result-name {
      width: 100%;
      margin: 0;
      border: 0;
      outline: 0;
      color: var(--ink);
      background: transparent;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.05rem, 3.2vw, 2rem);
      line-height: 1.1;
    }

    .name-input::placeholder {
      color: rgba(21,17,13,.55);
      opacity: 1;
    }

    .result-name {
      display: none;
      font-family: Arial Black, Arial, Helvetica, sans-serif;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
      text-wrap: balance;
    }

    .name-panel.result-mode .name-input {
      display: none;
    }

    .name-panel.result-mode .result-name {
      display: block;
      animation: reveal .28s ease;
    }

    .action-button {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      cursor: pointer;
      color: var(--cream);
      background:
        linear-gradient(rgba(182,25,28,.96), rgba(182,25,28,.96)),
        repeating-linear-gradient(
          0deg,
          transparent 0 6px,
          rgba(0,0,0,.04) 6px 7px
        );
      font-family: Arial Black, Arial, Helvetica, sans-serif;
      font-size: clamp(.9rem, 3.1vw, 2rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: .015em;
      text-transform: uppercase;
      white-space: nowrap;
      box-shadow: 5px 5px 0 rgba(21,17,13,.2);
    }

    .action-button:hover {
      filter: brightness(1.04);
    }

    .action-button:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 rgba(21,17,13,.2);
    }

    .photo-wrap {
      padding: 0 3.4% 34px;
    }

    .photo {
      display: block;
      width: 100%;
      height: auto;
      transform: rotate(-.35deg);
      filter: contrast(1.04);
      box-shadow: 8px 9px 0 rgba(21,17,13,.18);
    }

    .copy-button {
      display: none;
      margin: 14px auto 0;
      border: 0;
      padding: 9px 14px;
      cursor: pointer;
      color: var(--cream);
      background: var(--ink);
      font-weight: 900;
      letter-spacing: .07em;
      text-transform: uppercase;
    }

    .copy-button.visible { display: block; }

    footer {
      padding: 0 28px 28px;
      text-align: center;
      font-size: .66rem;
      line-height: 1.5;
      opacity: .68;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 560px) {
      body { padding: 0; }

      .site {
        width: 100%;
        box-shadow: none;
      }

      .field-row {
        grid-template-columns: 1fr;
      }

      .action-button {
        min-height: 58px;
      }

      .photo-wrap {
        padding-top: 8px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <main class="site">
    <img class="header-art" src="header-art.png" alt="Travelling Wilburys — What Is Your Wilbury Name?">

    <p class="quote">“Someday everybody gonna be a Wilbury.”</p>

    <form class="generator" id="generatorForm">
      <label class="field-label" id="fieldLabel" for="personName">Enter your name</label>

      <div class="field-row">
        <div class="name-panel" id="namePanel">
          <input
            class="name-input"
            id="personName"
            type="text"
            maxlength="80"
            autocomplete="name"
            placeholder="Your Name Here"
            required
          >
          <p class="result-name" id="resultName" aria-live="polite"></p>
        </div>

        <button class="action-button" id="actionButton" type="submit">Find Out</button>
      </div>

      <button class="copy-button" id="copyButton" type="button">Copy My Name</button>
    </form>

    <div class="photo-wrap">
      <img class="photo" src="wilburys-photo.png" alt="Vintage-style photograph of the Traveling Wilburys">
    </div>

    <footer>
      Fan-made novelty project. Not affiliated with the Traveling Wilburys,
      their estates, labels, roadies, cousins or mysterious half-brothers.
    </footer>
  </main>

  <script>
    const officialAliases = {
      jeff: "Otis Wilbury",
      bob: "Lucky Wilbury",
      robert: "Lucky Wilbury",
      george: "Nelson Wilbury",
      tom: "Charlie T. Wilbury Jr.",
      thomas: "Charlie T. Wilbury Jr.",
      roy: "Lefty Wilbury"
    };

    const maleAliases = [
      "Amos","Arlo","Buster","Clyde","Clem","Cornelius","Dewey","Elmer",
      "Elwood","Floyd","Gus","Hank","Harlan","Homer","Jasper","Jeb",
      "Lester","Mack","Marlow","Merle","Milo","Orville","Otto","Percy",
      "Roscoe","Rufus","Silas","Virgil","Wally","Wendell","Wiley","Zeke"
    ];

    const femaleAliases = [
      "Birdie","Mabel","Dottie","Hattie","Pearl","Bonnie","Lula","Elsie",
      "Josie","Daisy","Winnie","Sadie","Ruby","Cleo","Etta","Flora","June",
      "Cora","Fern","Opal","Goldie","Alma","Delia","Lottie","Faye","Boots",
      "Cricket","Honey","Dusty","Bessie","Dolly","Millie","Nellie","Tilly",
      "Rosie","Lucille","Mae","Minnie","Jolene","Patsy","Betty","Maggie"
    ];

    const femaleNames = new Set([
      "abby","abigail","ada","adelaide","adele","adriana","agnes","aimee",
      "alana","alexandra","alice","alicia","alison","alyssa","amanda","amber",

      "charlotte","chelsea","cheryl","chloe","christina","christine","claire",
      "clara","claudia","courtney","daisy","danielle","daphne","deborah",
      "diana","diane","donna","dorothy","eden","edith","eileen","elaine",
      "eleanor","elena","elise","elizabeth","ella","ellen","ellie","eloise",
      "elsie","emily","emma","erin","esther","eva","evelyn","faith","faye",
      "fiona","florence","frances","gabriella","georgia","gina","gloria",
      "grace","hannah","harriet","hazel","heather","heidi","helen","holly",
      "imogen","irene","isabel","isabella","ivy","jacqueline","jade","jane",
      "janet","jasmine","jean","jenna","jennifer","jessica","jill","joan",
      "joanna","jodie","josephine","joy","judith","julia","julie","juliet",
      "karen","kate","katherine","kathleen","katie","kayla","kelly","kelsey",

      "lily","linda","lisa","liv","lorraine","louise","lucy","lydia","mabel",

      "marilyn","marina","marisa","mary","matilda","maureen","maya","megan",
      "melanie","melissa","mia","michelle","mila","molly","monica","nadia",

    ]);

    const maleNames = new Set([
      "aaron","adam","adrian","alan","albert","alexander","alfred","andrew",
      "anthony","arthur","ben","benjamin","bernard","bill","billy","brad",
      "bradley","brandon","brian","bruce","cameron","carl","charles","chris",

      "louis","luke","marcus","mark","martin","matt","matthew","max","michael",
      "mike","mitchell","nathan","neil","nicholas","nick","noah","oliver",

      "rick","roger","ronald","ross","russell","ryan","samuel","scott","sean",
      "simon","stephen","steven","stuart","terry","theodore","tim","timothy",
      "toby","todd","tony","trevor","victor","vincent","wayne","william",
      "zachary","alexandros","andreas","christos","dimitri","dimitrios",
      "georgios","giannis","konstantinos","kostas","nikos","panayiotis",
      "spiros","stavros","theo","vasilis","yiannis"
    ]);

    const maleMiddles = ["","",""," B."," C."," J."," Ray"," Lee"," Earl"," Dean"," Joe"," Lou"];
    const femaleMiddles = ["","",""," B."," C."," J."," Mae"," June"," Pearl"," Lou"," Belle"," Rose"];
    const suffixes = ["Wilbury","Wilbury","Wilbury","Wilbury","Wilbury Jr.","Wilbury III"];

    function hashString(value) {
      let hash = 2166136261;
      for (let i = 0; i < value.length; i++) {
        hash ^= value.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function firstName(value) {
      return value.trim().split(/\s+/)[0].toLowerCase().replace(/[^a-z'-]/g, "");
    }

    function generateName(fullName) {
      const first = firstName(fullName);
      if (officialAliases[first]) return officialAliases[first];

      const seed = hashString(fullName.trim().toLowerCase());
      let aliases;
      let middles;

      if (femaleNames.has(first)) {
        aliases = femaleAliases;
        middles = femaleMiddles;
      } else if (maleNames.has(first)) {
        aliases = maleAliases;
        middles = maleMiddles;
      } else {
        aliases = [...maleAliases, ...femaleAliases];
        middles = [...maleMiddles, ...femaleMiddles];
      }

      return `${aliases[seed % aliases.length]}${middles[(seed >>> 5) % middles.length]} ${suffixes[(seed >>> 11) % suffixes.length]}`;
    }

    const form = document.getElementById("generatorForm");
    const input = document.getElementById("personName");
    const panel = document.getElementById("namePanel");
    const resultName = document.getElementById("resultName");
    const label = document.getElementById("fieldLabel");
    const actionButton = document.getElementById("actionButton");
    const copyButton = document.getElementById("copyButton");

    let showingResult = false;

    form.addEventListener("submit", event => {
      event.preventDefault();

      if (showingResult) {
        showingResult = false;
        panel.classList.remove("result-mode");
        label.textContent = "Enter your name";
        actionButton.textContent = "Find Out";
        copyButton.classList.remove("visible");
        input.value = "";
        input.focus();
        return;
      }

      const value = input.value.trim();
      if (!value) {
        input.focus();
        return;
      }

      resultName.textContent = generateName(value);
      panel.classList.add("result-mode");
      label.textContent = "Your Wilbury name";
      actionButton.textContent = "Again";
      copyButton.classList.add("visible");
      showingResult = true;
    });

    copyButton.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(resultName.textContent);
        copyButton.textContent = "Copied";
      } catch {
        copyButton.textContent = "Copy failed";
      }

      setTimeout(() => {
        copyButton.textContent = "Copy My Name";
      }, 1400);
    });
  </script>
</body>
</html>
