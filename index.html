<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>What Is Your Wilbury Name?</title>
<meta name="description" content="Discover your unofficial Wilbury name and baggage tag.">
<style>
:root{--ink:#251a12;--red:#94271f;--paper:#ead7ae}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{
  display:grid;
  place-items:center;
  padding:18px;
  background:#583820;
  font-family:"Courier New",Courier,monospace;
}
.poster{
  position:relative;
  width:min(100%,1024px);
  aspect-ratio:3/2;
  overflow:hidden;
  background:url("artwork-clean.png") center/100% 100% no-repeat;
  box-shadow:0 30px 90px rgba(0,0,0,.5);
}
.name-input{
  position:absolute;
  left:9.55%;
  top:33.85%;
  width:42.35%;
  height:7.2%;
  border:0;
  outline:0;
  padding:0 2.2%;
  color:var(--ink);
  background:transparent;
  font-size:clamp(.8rem,2vw,1.35rem);
}
.name-input::placeholder{color:rgba(37,26,18,.55)}
.name-input:focus{box-shadow:inset 0 0 0 3px rgba(148,39,31,.18)}
.find-button{
  position:absolute;
  left:18.55%;
  top:43.85%;
  width:24.95%;
  height:7.35%;
  border:0;
  cursor:pointer;
  color:#f0ddb9;
  background:transparent;
  font-size:clamp(.95rem,2.4vw,1.65rem);
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.035em;
  white-space:nowrap;
}
.find-button:active{transform:translateY(2px)}

.tag-values{
  position:absolute;
  left:36.75%;
  top:59.15%;
  width:38.85%;
  height:23.4%;
  transform:rotate(-1.6deg);
  pointer-events:none;
}
.value{
  position:absolute;
  color:var(--ink);
  font-weight:900;
  text-transform:uppercase;
  line-height:1.04;
  overflow-wrap:anywhere;
  opacity:0;
  transform:translateY(4px);
  transition:opacity .26s ease,transform .26s ease;
}
.tag-values.filled .value{opacity:1;transform:translateY(0)}
.v-name{left:3%;top:5%;width:68%;font-size:clamp(.88rem,2vw,1.35rem)}
.v-destination{left:3%;top:39%;width:60%;font-size:clamp(.72rem,1.55vw,1.05rem)}
.v-via{left:3%;top:72%;width:58%;font-size:clamp(.72rem,1.55vw,1.05rem)}
.v-number{left:66%;top:5%;width:32%;font-size:clamp(.68rem,1.45vw,.98rem)}
.v-route{left:66%;top:39%;width:30%;font-size:clamp(.68rem,1.45vw,.98rem)}
.v-checked{left:66%;top:72%;width:31%;font-size:clamp(.68rem,1.45vw,.98rem)}

.try-button,.copy-button{
  position:absolute;
  top:87.9%;
  height:5.9%;
  border:0;
  cursor:pointer;
  color:var(--ink);
  background:transparent;
  font-size:clamp(.5rem,1.15vw,.82rem);
  font-weight:900;
  text-transform:uppercase;
  white-space:nowrap;
}
.try-button{left:37.95%;width:16.0%}
.copy-button{left:56.65%;width:17.75%}
.try-button:active,.copy-button:active{transform:translateY(2px)}

@media(max-width:650px){
  body{padding:0}
  .poster{width:100%;box-shadow:none}
}
</style>
</head>
<body>
<main class="poster">
  <form id="generatorForm">
    <input class="name-input" id="personName" type="text" maxlength="80" autocomplete="name" placeholder="Type your name here..." required>
    <button class="find-button" type="submit">Find Out</button>
  </form>

  <section class="tag-values" id="tagValues" aria-live="polite">
    <span class="value v-name" id="alias"></span>
    <span class="value v-destination" id="destination"></span>
    <span class="value v-via" id="via"></span>
    <span class="value v-number" id="number"></span>
    <span class="value v-route" id="route"></span>
    <span class="value v-checked" id="checked"></span>
  </section>

  <button class="try-button" id="againButton" type="button">Try Another</button>
  <button class="copy-button" id="copyButton" type="button">Copy Details</button>
</main>

<script>
const official={
  jeff:"Otis Wilbury","jeff lynne":"Otis Wilbury",
  bob:"Lucky Wilbury",robert:"Lucky Wilbury","bob dylan":"Lucky Wilbury",
  george:"Nelson Wilbury","george harrison":"Nelson Wilbury",
  tom:"Charlie T. Wilbury Jr.",thomas:"Charlie T. Wilbury Jr.","tom petty":"Charlie T. Wilbury Jr.",
  roy:"Lefty Wilbury","roy orbison":"Lefty Wilbury"
};
const male=["Amos","Arlo","Buster","Clyde","Clem","Cornelius","Dewey","Elmer","Elwood","Floyd","Gus","Hank","Harlan","Homer","Jasper","Jeb","Lester","Mack","Marlow","Merle","Milo","Orville","Otto","Percy","Roscoe","Rufus","Silas","Virgil","Wally","Wendell","Wiley","Zeke"];
const female=["Birdie","Mabel","Dottie","Hattie","Pearl","Bonnie","Lula","Elsie","Josie","Daisy","Winnie","Sadie","Ruby","Cleo","Etta","Flora","June","Cora","Fern","Opal","Goldie","Alma","Delia","Lottie","Faye","Boots","Cricket","Honey","Dusty","Bessie","Dolly","Millie","Nellie","Tilly","Rosie","Lucille","Mae","Minnie","Jolene","Patsy","Betty","Maggie"];
const femaleNames=new Set(("abby abigail ada adelaide adele adriana agnes aimee alana alexandra alice alicia alison alyssa amanda amber amelia amy ana andrea angela angelina anita ann anna anne annie april ariana ashley audrey ava barbara beatrice bella belinda beth bethany betty bianca bridget brittany brooke caitlin camilla carla carmen carol caroline carolyn cassandra cassie catherine cathy charlotte chelsea cheryl chloe christina christine claire clara claudia courtney daisy danielle daphne deborah diana diane donna dorothy eden edith eileen elaine eleanor elena elise elizabeth ella ellen ellie eloise elsie emily emma erin esther eva evelyn faith faye fiona florence frances gabriella georgia gina gloria grace hannah harriet hazel heather heidi helen holly imogen irene isabel isabella ivy jacqueline jade jane janet jasmine jean jenna jennifer jessica jill joan joanna jodie josephine joy judith julia julie juliet karen kate katherine kathleen katie kayla kelly kelsey kim kirsten kylie laura lauren leah leila lena lillian lily linda lisa liv lorraine louise lucy lydia mabel madeline madison maggie maisie mandy margaret maria marie marilyn marina marisa mary matilda maureen maya megan melanie melissa mia michelle mila molly monica nadia naomi natalie natasha nicole nina nora olivia paige pamela patricia paula penelope phoebe rachel rebecca renee rita rose rosemary rosie ruby sally samantha sandra sarah savannah scarlett shannon sharon sheila shelley sophie sophia stacey stephanie susan suzanne sylvia tamara tanya tara teresa theresa tiffany tracy valerie vanessa veronica victoria violet wendy whitney yvette zoe eleni katerina sofia stella vasiliki despina").split(" "));
const destinations=["End of the Line","Handle With Care","Heading for the Light","New Blue Moon","Dirty World","Rattled","Last Night","Congratulations","She's My Baby","Wilbury Twist","Margarita","Not Alone Any More","Tweeter & the Monkey Man","Xanadu","Eldorado","Shangri-La","Cloud Nine","The Great Wide Open","Mystery Girl","Highway 61","Any Road","Learning to Fly","Blue Bayou"];
const viaStops=["Shangri-La","Xanadu","Eldorado","New Blue Moon","Cloud Nine","End of the Line","Heading for the Light","The Great Wide Open"];
const checkedBy=["Otis","Nelson","Lucky","Lefty","Charlie T."];
const maleMiddles=["","",""," B."," C."," J."," Ray"," Lee"," Earl"," Dean"," Joe"," Lou"];
const femaleMiddles=["","",""," B."," C."," J."," Mae"," June"," Pearl"," Lou"," Belle"," Rose"];
const suffixes=["Wilbury","Wilbury","Wilbury","Wilbury","Wilbury Jr.","Wilbury III"];

function hashString(value){
  let hash=2166136261;
  for(let i=0;i<value.length;i++){
    hash^=value.charCodeAt(i);
    hash=Math.imul(hash,16777619);
  }
  return hash>>>0;
}
function clean(value){return value.trim().replace(/\s+/g," ")}
function firstName(value){return clean(value).split(" ")[0].toLowerCase().replace(/[^a-z'-]/g,"")}
function generateAlias(fullName){
  const cleaned=clean(fullName),key=cleaned.toLowerCase(),first=firstName(cleaned);
  if(official[key]) return official[key];
  if(official[first]) return official[first];
  const seed=hashString(key),isFemale=femaleNames.has(first),aliases=isFemale?female:male,middles=isFemale?femaleMiddles:maleMiddles;
  return `${aliases[seed%aliases.length]}${middles[(seed>>>5)%middles.length]} ${suffixes[(seed>>>11)%suffixes.length]}`;
}
function generateTravel(fullName){
  const seed=hashString(clean(fullName).toLowerCase());
  return {
    destination:destinations[(seed>>>2)%destinations.length],
    via:viaStops[(seed>>>7)%viaStops.length],
    checked:checkedBy[(seed>>>13)%checkedBy.length],
    route:`TW-${88+(seed%3)}`,
    number:`WB-${String(seed%1000000).padStart(6,"0")}`
  };
}

const form=document.getElementById("generatorForm");
const input=document.getElementById("personName");
const tagValues=document.getElementById("tagValues");
const copyButton=document.getElementById("copyButton");
let current=null;

function clearTag(){
  ["alias","destination","via","number","route","checked"].forEach(id=>document.getElementById(id).textContent="");
  tagValues.classList.remove("filled");
  current=null;
}

function fillTag(name){
  const travel=generateTravel(name);
  current={alias:generateAlias(name),...travel};
  document.getElementById("alias").textContent=current.alias;
  document.getElementById("destination").textContent=current.destination;
  document.getElementById("via").textContent=current.via;
  document.getElementById("number").textContent=current.number;
  document.getElementById("route").textContent=current.route;
  document.getElementById("checked").textContent=current.checked;
  tagValues.classList.remove("filled");
  void tagValues.offsetWidth;
  tagValues.classList.add("filled");
}

form.addEventListener("submit",event=>{
  event.preventDefault();
  const value=clean(input.value);
  if(!value) return input.focus();
  fillTag(value);
});

document.getElementById("againButton").addEventListener("click",()=>{
  clearTag();
  input.value="";
  input.focus();
});

copyButton.addEventListener("click",async()=>{
  if(!current) return;
  const text=`${current.alias}
Destination: ${current.destination}
Via: ${current.via}
Route: ${current.route}
Baggage No.: ${current.number}
Checked by: ${current.checked}`;
  try{
    await navigator.clipboard.writeText(text);
    copyButton.textContent="Copied";
    setTimeout(()=>copyButton.textContent="Copy Details",1400);
  }catch{}
});

clearTag();
</script>
</body>
</html>
